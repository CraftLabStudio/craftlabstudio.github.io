<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CraftLab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="img/rlogo.png">

</head>

<body>

    <header class="navbar">
        <div class="logo">
            <img src="img/logo2.png" alt="CraftLab Logo">
            <span>CRAFTLAB STUDIO</span>
        </div>

        <nav>
            <a href="index.html" onclick="showTab('home')">Home</a>
            <a href="video.html" onclick="showTab('video')">Videos</a>
            <a href="template.html" onclick="showTab('template')">Template</a>
            <a href="community.html" onclick="showTab('community')">Community</a>
            <a href="about.html" onclick="showTab('about')">About</a>


            <!-- Music Button -->
            <button id="music-toggle" class="nav-btn">🔇</button>

            <!-- Volume Control -->
            <div class="volume-control">
                <button class="vol-btn" id="vol-down">−</button>
                <input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.3" />
                <button class="vol-btn" id="vol-up">+</button>
                <span id="vol-percent">30%</span>
            </div>
        </nav>

        <!-- Background Music -->
        <audio id="bg-music" loop>
            <source src="sound/music.mp3" type="audio/mpeg">
        </audio>
    </header>

    <!-- HOME PAGE -->
    <section id="home">
        <section class="hero">
            <div class="hero-text">
                <h1>Crafting the Extraordinary</h1>
                <!-- Inside HOME PAGE section, update the buttons like this -->
                <div class="buttons">
                    <button class="primary" onclick="location.href='video.html'">
                        Watch Latest Tutorial
                    </button>

                    <button class="secondary" onclick="location.href='template.html'">
                        Browse Templates
                    </button>

                </div>

            </div>

            <div class="hero-video">
                <div class="video-card" onclick="openVideo('h8KZtFuv1Hs')">
                    <span>WATCH DIY</span>
                    <h3>Pokemon Dynamax Band</h3>
                    <div class="play">▶</div>
                </div>
            </div>
        </section>

        <section class="tutorials">
            <h2>LATEST <span>TUTORIALS</span></h2>
            <div class="cards">
                <div class="card" onclick="openVideo('h8KZtFuv1Hs')">▶ Pokemon Dynamax Band</div>
                <!-- <div class="card" onclick="openVideo('-noNTO8JIGQ')">▶ Custom Resin Lamp</div>
                <div class="card" onclick="openVideo('2t5ynIGWTGA')">▶ Wooden LED Sign</div> -->
            </div>
        </section>

        <section class="template">
            <h2>LATEST TEMPLATES</h2>
            <div class="hex-grid">
                <div class="hex" data-download="img/Template.png">Dynamax Band</div>
                 <!-- <div class="hex" data-download="img/logo2.png">3D Prints</div>
                <div class="hex" data-download="img/logo2.png">Woodworking</div>
                <div class="hex" data-download="img/logo2.png">Digital Builds</div> -->
            </div>
        </section>
    </section>

    <footer class="footer">
        <p>© 2026 CraftLab Studio — Built for Creators <span class="footer-separator">•</span> Music: "Chill Vibe Beat"
            –
            Pixabay</p>
    </footer>

    <script src="script2.js"></script>

    <!-- =========================
   YOUTUBE VIDEO MODAL
========================= -->
    <div id="videoModal" class="video-modal">
        <div class="video-container">
            <span class="close-btn" onclick="closeVideo()">✕</span>
            <iframe id="ytPlayer" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>

                <div class="yt-actions">
                    <a href="https://www.youtube.com/watch?v=h8KZtFuv1Hs" target="_blank" class="yt-btn">👍 Like</a>

                    <a href="https://www.youtube.com/watch?v=h8KZtFuv1Hs" target="_blank" class="yt-btn">💬 Comment</a>

                    <a href="https://www.youtube.com/@LovesCraftingLab" target="_blank" class="yt-btn">🔔 Subscribe</a>
                </div>
            </iframe>
        </div>
    </div>

</body>

</html>
